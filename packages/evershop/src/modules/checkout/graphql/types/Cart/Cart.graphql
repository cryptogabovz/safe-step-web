"""
Shopping Cart interface
"""
interface ShoppingCart {
  uuid: String!
  currency: String!
  customerId: Int
  customerGroupId: Int
  customerEmail: String
  customerFullName: String
  userIp: String
  userId: String
  coupon: String
  noShippingRequired: Boolean!
  shippingFeeExclTax: Price!
  shippingFeeInclTax: Price!
  shippingTaxAmount: Price!
  discountAmount: Price!
  subTotal: Price!
  subTotalInclTax: Price!
  subTotalWithDiscount: Price!
  subTotalWithDiscountInclTax: Price!
  totalQty: Int!
  totalWeight: Weight!
  taxAmount: Price!
  taxAmountBeforeDiscount: Price!
  totalTaxAmount: Price!
  grandTotal: Price!
  shippingMethodName: String
  """
  Structured shipping selection — provider, method code, snapshot. Replaces
  shippingMethod/shippingMethodName in phase 8; both back-compat fields
  resolve from this in phase 4+.
  """
  shippingMethodData: ShippingMethodData
  shippingAddress: Address
  paymentMethod: String
  paymentMethodName: String
  billingAddress: Address
  shippingNote: String
  createdAt: Date!
  updatedAt: Date!
}

"""
Shopping Cart Item interface
"""
interface ShoppingCartItem {
  uuid: String!
  productId: ID!
  productSku: String!
  productName: String
  thumbnail: String
  noShippingRequired: Boolean!
  productWeight: Weight!
  productPrice: Price!
  productPriceInclTax: Price!
  qty: Int!
  finalPrice: Price!
  finalPriceInclTax: Price!
  taxPercent: Float!
  taxAmount: Price!
  taxAmountBeforeDiscount: Price!
  discountAmount: Price!
  lineTotal: Price!
  subTotal: Price! # Deprecated, this field is equivalent to lineTotal
  lineTotalWithDiscount: Price!
  lineTotalWithDiscountInclTax: Price!
  lineTotalInclTax: Price!
  total: Price! # Deprecated, this field is equivalent to lineTotalInclTax
  variantGroupId: Int
  variantOptions: [VariantOption]
  productCustomOptions: String
  productUrl: String
}

"""
Address interface
"""
interface Address {
  fullName: String
  postcode: String
  telephone: String
  country: Country
  province: Province
  city: String
  address1: String
  address2: String
}

"""
Represent a Cart Address
"""
type CartAddress implements Address {
  cartAddressId: Int!
  uuid: String!
  fullName: String
  postcode: String
  telephone: String
  country: Country
  province: Province
  city: String
  address1: String
  address2: String
}

type VariantOption {
  attributeCode: String!
  attributeName: String!
  attributeId: Int!
  optionId: Int!
  optionText: String!
}
"""
Represent a Cart Item
"""
type CartItem implements ShoppingCartItem {
  cartItemId: ID
  uuid: String!
  cartId: ID!
  removeApi: String!
  updateQtyApi: String!
  productId: ID!
  productSku: String!
  productName: String
  thumbnail: String
  noShippingRequired: Boolean!
  productWeight: Weight!
  productPrice: Price!
  productPriceInclTax: Price!
  qty: Int!
  finalPrice: Price!
  finalPriceInclTax: Price!
  taxPercent: Float!
  taxAmount: Price!
  taxAmountBeforeDiscount: Price!
  discountAmount: Price!
  lineTotal: Price!
  subTotal: Price! # Deprecated, this field is equivalent to lineTotal
  lineTotalWithDiscount: Price!
  lineTotalWithDiscountInclTax: Price!
  lineTotalInclTax: Price!
  total: Price! # Deprecated, this field is equivalent to lineTotalInclTax
  variantGroupId: Int
  variantOptions: [VariantOption]
  productCustomOptions: String
  productUrl: String
  errors: [String!]
}

"""
Represent a Cart
"""
type Cart implements ShoppingCart {
  cartId: ID!
  uuid: String!
  items: [CartItem]
  noShippingRequired: Boolean!
  shippingAddress: CartAddress
  billingAddress: CartAddress
  currency: String!
  customerId: Int
  customerGroupId: Int
  customerEmail: String
  customerFullName: String
  userIp: String
  userId: String
  status: Int!
  coupon: String
  shippingFeeExclTax: Price!
  shippingFeeInclTax: Price!
  shippingTaxAmount: Price!
  discountAmount: Price!
  subTotal: Price!
  subTotalInclTax: Price!
  subTotalWithDiscount: Price!
  subTotalWithDiscountInclTax: Price!
  totalQty: Int!
  totalWeight: Weight!
  taxAmount: Price!
  taxAmountBeforeDiscount: Price!
  totalTaxAmount: Price!
  grandTotal: Price!
  shippingMethodName: String
  shippingMethodData: ShippingMethodData
  paymentMethod: String
  paymentMethodName: String
  shippingNote: String
  addItemApi: String!
  addPaymentMethodApi: String!
  addShippingMethodApi: String!
  addContactInfoApi: String!
  addAddressApi: String!
  addNoteApi: String!
  checkoutApi: String!
  createdAt: Date!
  updatedAt: Date!
}

extend type Query {
  cart(id: String!): Cart
  myCart: Cart
}
