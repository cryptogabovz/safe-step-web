"""
Represents an Order Address.
"""
type OrderAddress implements Address {
  orderAddressId: Int!
  uuid: String!
  fullName: String
  postcode: String
  telephone: String
  country: Country
  province: Province
  city: String
  address1: String
  address2: String
}

"""
Represents an Order Item.
"""
type OrderItem implements ShoppingCartItem {
  orderItemId: ID!
  uuid: String!
  orderId: ID!
  productId: ID!
  productSku: String!
  productName: String
  thumbnail: String
  noShippingRequired: Boolean!
  productWeight: Weight!
  productPrice: Price!
  productPriceInclTax: Price!
  qty: Int!
  finalPrice: Price!
  finalPriceInclTax: Price!
  taxPercent: Float!
  taxAmount: Price!
  taxAmountBeforeDiscount: Price!
  discountAmount: Price!
  lineTotal: Price!
  subTotal: Price! # Deprecated, this field is equivalent to lineTotal
  lineTotalWithDiscount: Price!
  lineTotalWithDiscountInclTax: Price!
  lineTotalInclTax: Price!
  total: Price! # Deprecated, this field is equivalent to lineTotalInclTax
  variantGroupId: Int
  variantOptions: [VariantOption]
  productCustomOptions: String
  productUrl: String
  """
  Per-item fulfillment state derived from this item's shipment_item rows
  joined to non-cancelled shipments. One of `pending` | `partial_shipped` |
  `shipped` | `delivered` | `digital`. Digital items (`noShippingRequired`)
  short-circuit to `digital`; everything else aggregates the committed
  qty per phase:
    - `delivered`        â€” qty in delivered shipments >= item.qty
    - `shipped`          â€” committed (pending+shipped+delivered) >= item.qty
    - `partial_shipped`  â€” some committed, but less than item.qty
    - `pending`          â€” nothing committed yet
  The order-level `Order.shipmentStatus` rollup already aggregates this
  across the whole order; this field is the per-line equivalent.
  """
  fulfillmentBadge: String!
}

"""
Represents an Order.
"""
type Order implements ShoppingCart {
  orderId: ID!
  uuid: String!
  orderNumber: String!
  status: Status
  items: [OrderItem]
  noShippingRequired: Boolean!
  shippingAddress: OrderAddress
  billingAddress: OrderAddress
  currency: String!
  customerId: Int
  customerGroupId: Int
  customerEmail: String
  customerFullName: String
  userIp: String
  userId: String
  coupon: String
  shippingFeeExclTax: Price!
  shippingFeeInclTax: Price!
  shippingTaxAmount: Price!
  discountAmount: Price!
  subTotal: Price!
  subTotalInclTax: Price!
  subTotalWithDiscount: Price!
  subTotalWithDiscountInclTax: Price!
  totalQty: Int!
  totalWeight: Weight!
  taxAmount: Price!
  taxAmountBeforeDiscount: Price!
  totalTaxAmount: Price!
  grandTotal: Price!
  shippingMethodName: String
  """
  Structured shipping selection â€” provider, method code, snapshot.
  Backfilled for historical orders from the legacy varchar columns
  (see Version-1.0.8 migration). New orders write this directly via
  cart.exportData(). Replaces shippingMethod/shippingMethodName in phase 8.
  """
  shippingMethodData: ShippingMethodData
  shipmentStatus: ShipmentStatus
  paymentMethod: String
  paymentMethodName: String
  paymentStatus: PaymentStatus
  shippingNote: String
  createdAt: Date!
  updatedAt: Date!
  activities: [Activity]
  """Deprecated singular. Returns the earliest shipment for back-compat â€” use `shipments` instead. Dropped in Z1."""
  shipment: Shipment @deprecated(reason: "Use shipments. Returns the earliest shipment for back-compat.")
  """All shipments on this order, ordered by created_at ascending. Storefront-safe."""
  shipments: [Shipment!]!
}

"""
Represents an Order Activity.
"""
type Activity {
  orderActivityId: Int!
  comment: String
  customerNotified: Int!
  createdAt: DateTime
  updatedAt: DateTime
}

"""
Represents a Shipment.
"""
type Shipment {
  shipmentId: Int!
  uuid: String!
  carrier: String
  trackingNumber: String
  """Carrier display name resolved server-side from the registered carriers. Null if carrier code isn't registered."""
  carrierName: String
  """Carrier tracking URL with the tracking number substituted, or null if no template/no tracking number."""
  trackingUrl: String
  """
  Resolved status (name + badge + phase) from the registry. Returns an object,
  not a raw code â€” matches `Order.shipmentStatus` shape. To access the raw
  code: `shipment.status.code`.
  """
  status: ShipmentStatus!
  """
  The phase this shipment is in (one of pending / shipped / delivered / canceled).
  Convenience field that mirrors `shipment.status.phase`; kept for terse queries
  and storefront templates where the full status object is overkill.
  """
  phase: String!
  """First-occurrence timestamp; null until the shipment first enters the shipped phase."""
  shippedAt: DateTime
  """First-occurrence timestamp; null until the shipment first enters the delivered phase."""
  deliveredAt: DateTime
  """First-occurrence timestamp; null until the shipment is canceled."""
  canceledAt: DateTime
  """
  Carrier-hosted URL for the purchased shipping label, or null when admin
  chose 'I already have a tracking number' or after the label has been
  voided. EverShop never stores the label binary â€” this URL points at
  whatever the carrier provider hands back.
  """
  labelUrl: String
  """Items in this shipment with their qty."""
  items: [ShipmentItem!]!
  createdAt: DateTime!
  updatedAt: DateTime
}

"""
One item line inside a Shipment. References the order_item; carries the qty
being shipped in this shipment.
"""
type ShipmentItem {
  uuid: String!
  orderItemId: Int!
  qty: Int!
  productSku: String
  thumbnail: String
  productName: String
}


"""
Retrieve an list of order.
"""
type OrderCollection {
  items: [Order]
  currentPage: Int!
  total: Int!
  currentFilters: [Filter]
}

extend type Customer {
  orders: [Order]
}

extend type Query {
  order(uuid: String!): Order
  """
  Anonymous tracking token status, populated by the `orderTracking` page
  middleware (`/orders/:uuid/track`). One of `ok`, `expired`, `invalid`,
  `mismatch`, `no_secret`, or `null` on any other page. The page React
  component branches on this rather than re-verifying the token client-side.
  """
  trackingTokenStatus: String
}
